apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-flask-app
  template:
    metadata:
      labels:
        app: cicd-flask-app
    spec:
      containers:
        - name: cicd-flask-app
          image: ranjith1204/cicd-flask-app:v1
          ports:
            - containerPort: 5000
